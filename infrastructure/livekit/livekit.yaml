# LiveKit self-hosted configuration
# Full options: https://github.com/livekit/livekit/blob/master/config-sample.yaml

port: 7880

rtc:
  # Discover public IP via STUN — required in cloud/VPS environments
  use_external_ip: true
  tcp_port: 7881
  port_range_start: 10000
  port_range_end: 10100
  stun_servers:
    - stun.l.google.com:19302

# API key/secret pairs (must match gateway LIVEKIT_API_KEY / LIVEKIT_API_SECRET)
keys:
  devkey: secret

# Redis disabled for single-node deployment — avoids stale v1.7 keys causing RESUME loops.
# Re-enable for multi-node clustering.
# redis:
#   address: redis:6379

logging:
  level: info
  json: true
