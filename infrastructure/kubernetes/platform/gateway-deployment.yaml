apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: registry.gcloude.ru/platform/gateway-service:latest
          ports:
            - containerPort: 8000
