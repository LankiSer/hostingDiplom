# External nginx already uses host :80 / :443 — platform nginx on localhost only.
# Usage (automatic via setup.sh when HOST_NGINX_MODE=true or port 80 is busy):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     -f docker-compose.host-nginx.yml --env-file .env.production up -d

services:
  nginx:
    ports:
      - target: 80
        published: 8080
        host_ip: 127.0.0.1
        protocol: tcp
      - target: 443
        published: 8443
        host_ip: 127.0.0.1
        protocol: tcp
