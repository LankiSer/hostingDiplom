<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRM Demo</title>
    <style>
      body { background:#020617; color:#e2e8f0; font-family:Arial,sans-serif; padding:48px; }
      .card { max-width:720px; border:1px solid #1e293b; border-radius:24px; padding:32px; background:#0f172a; }
      .badge { display:inline-block; margin-bottom:16px; padding:8px 12px; border-radius:999px; background:#0ea5e91a; color:#7dd3fc; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">crm.apps.localhost</div>
      <h1>CRM-микросервис доступен локально</h1>
      <p>Этот демо-сервис показывает, как клиентское приложение открывается на отдельном поддомене через локальный `nginx` и `.localhost` без ручной настройки `hosts`.</p>
    </div>
  </body>
</html>
