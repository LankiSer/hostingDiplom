# Phase 1: HTTP only — for first deploy and Let's Encrypt webroot challenge.
# Set NGINX_CONFIG=nginx.http.conf in .env.production
#
# Domains:
#   app.kostricyn.ru      — кабинет (frontend + /api)
#   api.kostricyn.ru      — gateway API
#   *.apps.kostricyn.ru   — задеплоенные приложения (platform.d/*.conf)

events {}

http {
  include /etc/nginx/snippets/ssl-params.conf;
  include /etc/nginx/platform.d/*.conf;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream dashboard_upstream {
    server frontend:3000;
  }

  upstream gateway_upstream {
    server gateway-service:8000;
  }

  # Docker-internal resolver — defers livekit DNS lookup to request time
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Dashboard: app.kostricyn.ru
  server {
    listen 80;
    server_name app.kostricyn.ru;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location /api/ {
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_set_header x-platform-email $http_x_platform_email;
      proxy_set_header x-platform-role $http_x_platform_role;
      proxy_set_header x-platform-name $http_x_platform_name;
    }

    location /livekit/ {
      set $livekit_backend "livekit:7880";
      rewrite ^/livekit/(.*)$ /$1 break;
      proxy_pass http://$livekit_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
      proxy_connect_timeout 30s;
      proxy_buffering off;
    }

    location / {
      proxy_pass http://dashboard_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # API: api.kostricyn.ru
  server {
    listen 80;
    server_name api.kostricyn.ru;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
    }
  }

  # Fallback for undeployed user apps (*.apps.kostricyn.ru)
  server {
    listen 80;
    server_name ~^(?<service_name>.+)\.apps\.kostricyn\.ru$;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 404 "App not deployed or still building.";
      default_type text/plain;
    }
  }
}
