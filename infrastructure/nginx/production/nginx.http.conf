# Phase 1: HTTP only — for first deploy and Let's Encrypt webroot challenge.
# Set NGINX_CONFIG=nginx.http.conf in .env.production
#
# Domains:
#   app.kostricyn.ru      — кабинет (frontend + /api)
#   api.kostricyn.ru      — gateway API
#   *.apps.kostricyn.ru   — задеплоенные приложения (platform.d/*.conf)

events {}

http {
  include /etc/nginx/snippets/ssl-params.conf;
  include /etc/nginx/platform.d/*.conf;

  upstream dashboard_upstream {
    server frontend:3000;
  }

  upstream gateway_upstream {
    server gateway-service:8000;
  }

  # Dashboard: app.kostricyn.ru
  server {
    listen 80;
    server_name app.kostricyn.ru;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location /api/ {
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://dashboard_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # API: api.kostricyn.ru
  server {
    listen 80;
    server_name api.kostricyn.ru;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # Fallback for undeployed user apps (*.apps.kostricyn.ru)
  server {
    listen 80;
    server_name ~^(?<service_name>.+)\.apps\.kostricyn\.ru$;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 404 "App not deployed or still building.";
      default_type text/plain;
    }
  }
}
