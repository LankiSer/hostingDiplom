# Phase 2: HTTPS for platform (app + api).
# Per-app HTTPS: platform.d/<slug>.conf — one Let's Encrypt cert per subdomain.

events {}

http {
  include /etc/nginx/snippets/ssl-params.conf;
  include /etc/nginx/platform.d/*.conf;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream dashboard_upstream {
    server frontend:3000;
  }

  upstream gateway_upstream {
    server gateway-service:8000;
  }

  # Docker-internal resolver — defers livekit DNS lookup to request time
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Platform hosts: redirect to HTTPS (ACME stays on :80)
  server {
    listen 80;
    server_name app.kostricyn.ru api.kostricyn.ru;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # User app subdomains on :80 — only ACME here; each slug has its own file in platform.d
  server {
    listen 80 default_server;
    server_name ~^.+\.apps\.kostricyn\.ru$;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 404 "App not deployed. Add DNS A-record for this subdomain, then deploy.";
      default_type text/plain;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name app.kostricyn.ru;

    ssl_certificate     /etc/letsencrypt/live/kostricyn.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kostricyn.ru/privkey.pem;

    location /api/ {
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_set_header x-platform-email $http_x_platform_email;
      proxy_set_header x-platform-role $http_x_platform_role;
      proxy_set_header x-platform-name $http_x_platform_name;
    }

    location /livekit/ {
      set $livekit_backend "livekit:7880";
      # Strip /livekit/ prefix — variable in proxy_pass disables auto-rewrite
      rewrite ^/livekit/(.*)$ /$1 break;
      proxy_pass http://$livekit_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
      proxy_connect_timeout 30s;
      proxy_buffering off;
    }

    location / {
      proxy_pass http://dashboard_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name api.kostricyn.ru;

    ssl_certificate     /etc/letsencrypt/live/kostricyn.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kostricyn.ru/privkey.pem;

    location / {
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
    }
  }
}
