# Прокси с внешнего nginx → platform nginx в Docker
#
# Рекомендуется автоматическая установка (root на сервере):
#   bash setup.sh host-nginx
#
# Скрипт создаёт /etc/nginx/sites-available/gcloude-<domain>.conf:
#   - /.well-known/acme-challenge/ → /opt/hosting/runtime/certbot-webroot (для Let's Encrypt)
#   - остальное → http://127.0.0.1:8080 (platform nginx в Docker)
#
# Если app.kostricyn.ru уже описан в другом конфиге nginx — удалите дубликат
# или добавьте в существующий server { } блок location для ACME:

# location /.well-known/acme-challenge/ {
#     root /opt/hosting/runtime/certbot-webroot;
#     default_type text/plain;
#     try_files $uri =404;
# }

# Проверка перед certbot:
#   curl http://app.kostricyn.ru/.well-known/acme-challenge/test
#   (после bash setup.sh host-nginx — probe внутри setup.sh)
