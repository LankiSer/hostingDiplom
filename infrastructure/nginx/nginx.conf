events {}

http {
  include /etc/nginx/platform.d/*.conf;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Docker-internal resolver for dynamic upstreams
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream dashboard_upstream {
    server frontend:3000;
  }

  upstream gateway_upstream {
    server gateway-service:8000;
  }

  upstream crm_app_upstream {
    server demo-crm-app:80;
  }

  upstream bot_app_upstream {
    server demo-bot-app:80;
  }

  server {
    listen 80;
    server_name dashboard.localhost dashboard.gcloude.local dashboard.gcloude.ru localhost _;

    location /api/ {
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_set_header x-platform-email $http_x_platform_email;
      proxy_set_header x-platform-role $http_x_platform_role;
      proxy_set_header x-platform-name $http_x_platform_name;
    }

    location /livekit/ {
      set $livekit_backend "livekit:7880";
      rewrite ^/livekit/(.*)$ /$1 break;
      proxy_pass http://$livekit_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_connect_timeout 5s;
      proxy_next_upstream error timeout;
    }

    location / {
      proxy_pass http://dashboard_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name api.localhost api.gcloude.local api.gcloude.ru;

    location / {
      proxy_pass http://gateway_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name crm.apps.localhost crm.apps.gcloude.local;

    location / {
      proxy_pass http://crm_app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name bot.apps.localhost bot.apps.gcloude.local;

    location / {
      proxy_pass http://bot_app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name ~^(?<service_name>.+)\.apps\.(localhost|gcloude\.local|gcloude\.ru|kostricyn\.ru)$;

    location / {
      return 404 "App not deployed or still building.";
      default_type text/plain;
    }
  }
}
